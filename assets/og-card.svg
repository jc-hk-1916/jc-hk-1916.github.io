<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0a0a0a"/>
            <stop offset="50%" stop-color="#0d0a1f"/>
            <stop offset="100%" stop-color="#0a0a0a"/>
        </linearGradient>
        <radialGradient id="glow1" cx="20%" cy="30%" r="50%">
            <stop offset="0%" stop-color="#6366f1" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="glow2" cx="80%" cy="80%" r="50%">
            <stop offset="0%" stop-color="#d946ef" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#d946ef" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#6366f1"/>
            <stop offset="50%" stop-color="#8b5cf6"/>
            <stop offset="100%" stop-color="#d946ef"/>
        </linearGradient>
        <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#6366f1"/>
            <stop offset="100%" stop-color="#d946ef"/>
        </linearGradient>
        <filter id="iconShadow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="20"/>
            <feOffset dx="0" dy="10" result="offsetblur"/>
            <feFlood flood-color="#6366f1" flood-opacity="0.4"/>
            <feComposite in2="offsetblur" operator="in"/>
            <feMerge>
                <feMergeNode/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <!-- Background -->
    <rect width="1200" height="630" fill="url(#bg)"/>
    <rect width="1200" height="630" fill="url(#glow1)"/>
    <rect width="1200" height="630" fill="url(#glow2)"/>

    <!-- Top accent line -->
    <rect x="0" y="0" width="1200" height="3" fill="url(#accent)" opacity="0.7"/>

    <!-- App icon (rounded square) -->
    <g transform="translate(90, 215)" filter="url(#iconShadow)">
        <rect width="200" height="200" rx="44" fill="url(#iconBg)"/>
        <!-- Stylized terminal prompt + AI sparkle -->
        <g transform="translate(40, 60)" fill="#ffffff">
            <text x="0" y="46" font-family="SF Mono, Menlo, monospace" font-size="56" font-weight="700">&gt;_</text>
            <!-- Sparkle -->
            <g transform="translate(95, 0)">
                <path d="M15 0 L18 12 L30 15 L18 18 L15 30 L12 18 L0 15 L12 12 Z" fill="#ffffff" opacity="0.95"/>
            </g>
        </g>
    </g>

    <!-- Right side: text content -->
    <g transform="translate(330, 130)">
        <!-- Eyebrow -->
        <g>
            <rect x="0" y="0" width="290" height="36" rx="18" fill="#6366f1" fill-opacity="0.15" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
            <circle cx="20" cy="18" r="4" fill="#a5b4fc"/>
            <text x="34" y="24" font-family="-apple-system, Inter, sans-serif" font-size="14" font-weight="600" fill="#a5b4fc">AI Copilot built-in · Lifetime $29.99</text>
        </g>

        <!-- Title -->
        <text x="0" y="100" font-family="-apple-system, Inter, sans-serif" font-size="58" font-weight="800" fill="#ffffff" letter-spacing="-2">NaviTerm</text>
        <text x="0" y="158" font-family="-apple-system, Inter, sans-serif" font-size="38" font-weight="700" fill="#ffffff" letter-spacing="-1">The AI-powered SSH client</text>
        <text x="0" y="200" font-family="-apple-system, Inter, sans-serif" font-size="38" font-weight="700" fill="url(#accent)" letter-spacing="-1">for all Apple devices</text>

        <!-- Subtitle -->
        <text x="0" y="260" font-family="-apple-system, Inter, sans-serif" font-size="20" font-weight="400" fill="#a3a3a3">SSH · SFTP · Port forward · Automation · iCloud sync</text>
        <text x="0" y="290" font-family="-apple-system, Inter, sans-serif" font-size="20" font-weight="400" fill="#a3a3a3">Free for 5 hosts. Monthly $0.99 · Yearly $5.99 · Lifetime $29.99</text>

        <!-- Platform pills -->
        <g transform="translate(0, 340)">
            <g>
                <rect x="0" y="0" width="120" height="40" rx="20" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
                <text x="60" y="26" font-family="-apple-system, Inter, sans-serif" font-size="15" font-weight="600" fill="#e5e5e5" text-anchor="middle">macOS</text>
            </g>
            <g transform="translate(132, 0)">
                <rect x="0" y="0" width="120" height="40" rx="20" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
                <text x="60" y="26" font-family="-apple-system, Inter, sans-serif" font-size="15" font-weight="600" fill="#e5e5e5" text-anchor="middle">iPad</text>
            </g>
            <g transform="translate(264, 0)">
                <rect x="0" y="0" width="120" height="40" rx="20" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
                <text x="60" y="26" font-family="-apple-system, Inter, sans-serif" font-size="15" font-weight="600" fill="#e5e5e5" text-anchor="middle">iPhone</text>
            </g>
        </g>
    </g>

    <!-- Bottom-right URL -->
    <text x="1140" y="595" font-family="SF Mono, Menlo, monospace" font-size="16" font-weight="500" fill="#737375" text-anchor="end">www.trivix.cn</text>
</svg>
